<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

        }

        .container {
            border: 2px solid black;
            background-color: rgb(114, 11, 114);
            width: 500px;
            box-sizing: border-box;
            padding-left: 50px;
            border-radius: 15px;

        }
        .heading {
            font-size: 70px;
            color: rgb(245, 30, 30);
        }
        .sub-head{
            margin-top: 10px;
            font-size: 40px;
            font-weight: bold;
            color: white;
        }
        .login-input{
            width: 300px;
            height: 40px;
            border-radius: 20px;
            padding-left: 10px;
            font-size: 15px;
            color: whitesmoke;
            margin-top: 20px;
        }
        .login-btn{
            width: 300px;
            height: 45px;
            border-radius: 20px;
            font-size: 15px;
            margin-top: 20px;
            font-weight: bold;
            color: white;
            background-color: rgb(229, 80, 25);
        }
        .para{
            color: white;
            text-align:justify;
            margin:25px;
            font-size: 15px;
            padding-left: 25px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 class="heading">zepto</h1>
        <p class="sub-head">Groceries delivred <br> in 10 minutes</p>
        <div>
            <input type="number" placeholder="Enter Phone Number" class="login-input">
        </div>
        <button class="login-btn">Continue</button>
        <p class="para">By Continuing , you agree to our <br> Terms of service & Privacy Policy</p>

    </div>
</body>

</html>
